# catChat self-hosted server settings
#
# Copy this file to server.properties before starting with Docker Compose:
#   cp server.properties.example server.properties
#
# Priority order:
# 1. CATCHAT_SERVER_* environment variables, plus CATCHAT_PUBLIC_URL
# 2. Legacy CATCHAT_GUILD_* environment variables
# 3. Values in server.properties
# 4. Built-in defaults
#
# Keep secrets in .env. Do not put CATCHAT_SERVER_SECRET,
# CATCHAT_SERVER_REGISTRATION_TOKEN, OAuth secrets, JWT secrets, or hub secrets here.

# Server metadata shown in the catChat hub UI.
server-name=My catChat Server
server-description=A self-hosted catChat server

# Public URL where the hub backend can reach this server.
# Use HTTPS in production.
public-url=http://localhost:8100

# catChat hub URL used only to print the add-server invite link at startup.
# The invite link contains the public URL and invite code only. It does not
# contain CATCHAT_SERVER_SECRET or any hub secret.
hub-url=https://chat.dongurihub.com

# Persistent paths inside the Docker container. docker-compose.yml mounts ./data and ./uploads here.
database-path=/app/data/server.db
upload-dir=/app/uploads

# Attachment limits. SVG uploads are rejected even when image/* is allowed.
# Environment variable CATCHAT_SERVER_MAX_ATTACHMENT_SIZE uses bytes.
# This property keeps the human-friendly MB form for file-based configuration.
max-attachment-size-mb=50
max-attachments-per-message=5
allowed-file-types=image/*,video/*,audio/*,application/pdf,text/plain,application/zip
allow-executable-files=false

# Message limits.
max-message-length=4000
max-message-history=100

# Channel and member limits.
default-channel-name=general
allow-channel-create=true
max-channels=100
max-members=0

# Message features.
allow-message-edit=true
allow-message-delete=true
allow-replies=true
allow-reactions=true

# Startup invite printed to Docker logs.
default-invite-enabled=true
default-invite-max-uses=0
default-invite-expires-hours=0
allow-users-create-invites=false

# Moderation and audit feature flags.
enable-bans=true
enable-kicks=true
enable-reports=true
enable-audit-log=true

# CORS and access mode.
allowed-origins=https://chat.dongurihub.com
require-hub-proxy=true
allow-direct-browser-access=false

# Incoming Webhooks.
enable-incoming-webhooks=true
max-webhooks=20
webhook-rate-limit-per-minute=30
